<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>GCX Pulse Dashboard 2026</title>

  <!-- External Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    :root { 
      --bg: #0b1020; 
      --card: #121a33; 
      --muted: #9aa6c2; 
      --text: #e8eefc; 
      --accent: #78aaff;
      --green: #65ffd2;
      --amber: #ffd36a;
      --red: #ff92a8;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }
    
    * { box-sizing: border-box; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
    
    body { 
      margin: 0; 
      background: radial-gradient(1000px 700px at 20% 0%, #17224a 0%, var(--bg) 50%); 
      color: var(--text); 
      min-height: 100vh;
      line-height: 1.5;
    }

    .wrap { max-width: 1200px; margin: 0 auto; padding: 28px 18px 48px; }

    header { 
      display: flex; 
      justify-content: space-between; 
      align-items: flex-end; 
      margin-bottom: 24px; 
      border-bottom: 1px solid var(--glass-border); 
      padding-bottom: 16px; 
    }
    
    h1 { margin: 0; font-size: 26px; letter-spacing: -0.5px; font-weight: 800; }
    .sync-time { font-size: 12px; color: var(--muted); }

    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 24px; }
    
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; margin-bottom: 8px; }
    .value { font-size: 38px; font-weight: 800; color: #fff; }
    
    .filters { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
    select {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 12px;
      min-width: 240px;
      cursor: pointer;
      outline: none;
      font-size: 14px;
      transition: all 0.2s;
    }
    select:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); }

    .pill { padding: 5px 14px; border-radius: 999px; font-size: 11px; font-weight: 800; display: inline-block; text-transform: uppercase; }
    .g { background: rgba(101,255,210,0.1); color: var(--green); border: 1px solid rgba(101,255,210,0.3); }
    .a { background: rgba(255,211,106,0.1); color: var(--amber); border: 1px solid rgba(255,211,106,0.3); }
    .r { background: rgba(255,146,168,0.1); color: var(--red); border: 1px solid rgba(255,146,168,0.3); }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(480px, 1fr)); gap: 24px; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

    table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 8px; }
    th, td { text-align: left; padding: 14px 12px; border-bottom: 1px solid var(--glass-border); }
    th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; border-bottom: 2px solid var(--glass-border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .risk-item { margin-bottom: 24px; }
    .risk-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 16px; }
    .risk-text { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; line-height: 1.4; }
    .risk-score { font-weight: 800; font-size: 15px; }
    
    .bar-outer { height: 8px; background: rgba(255,255,255,0.08); border-radius: 10px; overflow: hidden; }
    .bar-inner { height: 100%; background: var(--accent); border-radius: 10px; transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }

    .chart-container { position: relative; height: 260px; width: 100%; }

    #error-box { 
      background: rgba(255,80,110,0.1); 
      border: 1px solid var(--red); 
      color: var(--red); 
      padding: 16px; 
      border-radius: 12px; 
      margin-bottom: 24px; 
      display: none;
      font-size: 14px;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <header>
      <h1 id="title">GCX Pulse Dashboard</h1>
      <div class="sync-time" id="sync-time">Initializing...</div>
    </header>

    <div id="error-box"></div>

    <div class="kpi-row">
      <div class="card">
        <div class="label">Total Responses</div>
        <div class="value" id="kpi-n">—</div>
      </div>
      <div class="card">
        <div class="label">Overall Score</div>
        <div class="value" id="kpi-avg">—</div>
      </div>
      <div class="card">
        <div class="label">Sentiment Status</div>
        <div id="kpi-status" style="margin-top:12px">—</div>
      </div>
    </div>

    <div class="filters">
      <select id="role-filter"><option>Loading...</option></select>
      <select id="team-filter"><option>Loading...</option></select>
    </div>

    <div class="grid">
      <div class="card">
        <div class="label" style="margin-bottom:20px;">Sentiment Trend</div>
        <div class="chart-container">
          <canvas id="chart-trend"></canvas>
        </div>
      </div>

      <div class="card">
        <div class="label" style="margin-bottom:20px;">Focus Areas (Lowest Scores)</div>
        <div id="risk-container"></div>
      </div>

      <div class="card">
        <div class="label" style="margin-bottom:10px;">Scores by Role / Level</div>
        <div style="overflow-x: auto;">
          <table id="table-role"></table>
        </div>
      </div>

      <div class="card">
        <div class="label" style="margin-bottom:10px;">Scores by Team</div>
        <div style="overflow-x: auto;">
          <table id="table-team"></table>
        </div>
      </div>
    </div>
  </div>

<script>
  /**
   * Configuration with YOUR ACTUAL Google Sheets link
   */
  const CONFIG = {
    "title": "GCX Pulse Dashboard 2026",
    "csvUrl": "https://docs.google.com/spreadsheets/d/e/2PACX-1vT7h3efOLAnxhD58fxFZaDC4DojTizyesVqOjY4HLQxfMWBw4hEluAKnATe33qq2gEkQrY3xM-RSKlu/pub?output=csv",
    "thresholds": {
      "greenMin": 4.2,
      "amberMin": 3.6
    },
    "columns": {
      "timestamp": "Timestamp",
      "role": "What is your current role/ level?",
      "team": "What is your new team?"
    },
    "questions": [
      { "id": "q1", "col": "I feel able to perform effectively in my new role." },
      { "id": "q2", "col": "I have what I need (tools, access, information) to do my job well." },
      { "id": "q3", "col": "I understand how my responsibilities have changed as part of this transition." },
      { "id": "q4", "col": "The reasons for this change have been clearly explained." },
      { "id": "q5", "col": "Communication during this transition has been consistent and clear" }
    ]
  };

  let RAW_DATA = [];
  let chartInstance = null;

  const normalize = (s) => (s || '').toLowerCase().replace(/[^a-z0-9]/g, '').trim();

  const parseScore = (val) => {
    if (!val) return null;
    const n = parseInt(String(val).match(/\d+/));
    return isNaN(n) ? null : n;
  };

  const calculateMean = (arr) => {
    const valid = arr.filter(v => v !== null && !isNaN(v));
    return valid.length ? valid.reduce((a, b) => a + b, 0) / valid.length : null;
  };

  const getStatus = (val) => {
    if (val >= CONFIG.thresholds.greenMin) return { label: 'HEALTHY', class: 'g' };
    if (val >= CONFIG.thresholds.amberMin) return { label: 'STABLE', class: 'a' };
    return { label: 'CRITICAL', class: 'r' };
  };

  function updateDashboard() {
    const roleVal = document.getElementById('role-filter').value;
    const teamVal = document.getElementById('team-filter').value;
    
    const filtered = RAW_DATA.filter(d => 
      (roleVal === 'All' || d.role === roleVal) && 
      (teamVal === 'All' || d.team === teamVal)
    );

    const overallScore = calculateMean(filtered.map(d => d.overallAvg));
    document.getElementById('kpi-n').innerText = filtered.length;
    document.getElementById('kpi-avg').innerText = overallScore ? overallScore.toFixed(2) : '—';
    
    if (overallScore) {
      const status = getStatus(overallScore);
      document.getElementById('kpi-status').innerHTML = `<span class="pill ${status.class}">${status.label}</span>`;
    }

    const questionStats = CONFIG.questions.map(q => ({
      text: q.col,
      avg: calculateMean(filtered.map(d => d.answers[q.id]))
    })).sort((a, b) => (a.avg || 0) - (b.avg || 0));

    document.getElementById('risk-container').innerHTML = questionStats.slice(0, 4).map(q => {
      const pct = q.avg ? (q.avg / 5) * 100 : 0;
      const statusClass = q.avg ? getStatus(q.avg).class : 'r';
      return `
        <div class="risk-item">
          <div class="risk-info">
            <span class="risk-text">${q.text}</span>
            <span class="risk-score ${statusClass}">${q.avg ? q.avg.toFixed(1) : '—'}</span>
          </div>
          <div class="bar-outer"><div class="bar-inner" style="width:${pct}%"></div></div>
        </div>
      `;
    }).join('');

    renderTable(filtered, 'role', 'table-role', 'Role / Level');
    renderTable(filtered, 'team', 'table-team', 'New Team');
    updateChart(filtered);
  }

  function renderTable(data, key, elementId, headerLabel) {
    const groups = data.reduce((acc, row) => {
      const val = row[key] || 'Not Specified';
      acc[val] = acc[val] || [];
      acc[val].push(row.overallAvg);
      return acc;
    }, {});

    let html = `<thead><tr><th>${headerLabel}</th><th>Avg</th><th>Status</th></tr></thead><tbody>`;
    Object.entries(groups).sort().forEach(([name, scores]) => {
      const avg = calculateMean(scores);
      const status = getStatus(avg);
      html += `<tr>
        <td>${name}</td>
        <td>${avg ? avg.toFixed(2) : '—'}</td>
        <td><span class="pill ${status.class}">${status.label}</span></td>
      </tr>`;
    });
    document.getElementById(elementId).innerHTML = html + '</tbody>';
  }

  function updateChart(data) {
    const dateGroups = data.reduce((acc, row) => {
      acc[row.date] = acc[row.date] || [];
      acc[row.date].push(row.overallAvg);
      return acc;
    }, {});

    const sortedDates = Object.keys(dateGroups).sort();
    const chartData = sortedDates.map(d => calculateMean(dateGroups[d]));

    if (chartInstance) chartInstance.destroy();
    
    const ctx = document.getElementById('chart-trend').getContext('2d');
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: sortedDates,
        datasets: [{
          data: chartData,
          borderColor: '#78aaff',
          backgroundColor: 'rgba(120, 170, 255, 0.1)',
          fill: true,
          tension: 0.4,
          pointRadius: 5,
          pointBackgroundColor: '#78aaff',
          borderWidth: 3
        }]
      },
      options: {
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { min: 1, max: 5, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#9aa6c2', stepSize: 1 } },
          x: { ticks: { color: '#9aa6c2' }, grid: { display: false } }
        }
      }
    });
  }

  async function init() {
    try {
      document.getElementById('title').innerText = CONFIG.title;
      const csvRes = await fetch(CONFIG.csvUrl);
      if (!csvRes.ok) throw new Error("Could not connect to the Google Sheet CSV.");
      
      const csvText = await csvRes.text();
      const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true }).data;

      const sheetHeaders = Object.keys(parsed[0]);
      const findHeader = (target) => sheetHeaders.find(h => normalize(h).includes(normalize(target))) || target;

      RAW_DATA = parsed.map(row => {
        const answers = {};
        CONFIG.questions.forEach(q => { answers[q.id] = parseScore(row[findHeader(q.col)]); });
        return {
          role: row[findHeader(CONFIG.columns.role)] || 'Not Specified',
          team: row[findHeader(CONFIG.columns.team)] || 'Not Specified',
          date: (row[findHeader(CONFIG.columns.timestamp)] || '').split(' ')[0] || 'Unknown',
          answers,
          overallAvg: calculateMean(Object.values(answers))
        };
      }).filter(d => d.overallAvg !== null);

      const setupFilter = (id, key) => {
        const unique = ['All', ...new Set(RAW_DATA.map(d => d[key]))].sort();
        document.getElementById(id).innerHTML = unique.map(v => `<option value="${v}">${v}</option>`).join('');
        document.getElementById(id).onchange = updateDashboard;
      };
      
      setupFilter('role-filter', 'role');
      setupFilter('team-filter', 'team');
      document.getElementById('sync-time').innerText = `Last Sync: ${new Date().toLocaleTimeString()}`;
      updateDashboard();

    } catch (err) {
      const box = document.getElementById('error-box');
      box.style.display = 'block';
      box.innerText = "Error: " + err.message;
    }
  }

  window.onload = init;
</script>
</body>
</html>
